# iii engine config rendered into /etc/iii/engine.yaml by user-data.
# Authoritative copy: terraform/user-data/engine.sh.tftpl. This file
# is for reference / diffing only.
engine:
  port: 49134
  host: 0.0.0.0

workers:
  - name: iii-http
    config:
      host: 0.0.0.0
      port: 3111

  - name: iii-state
    config:
      adapter: file
      path: /var/lib/iii/state

observability:
  console: true
  in_memory: true
