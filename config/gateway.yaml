# iii HTTP gateway config — rendered into /etc/iii/gateway.yaml on the gateway VM.
#
# NOTE: The schema below is illustrative. Validate against the iii-http
# release you actually deploy and adjust keys to match upstream.
listen: 0.0.0.0:80

engine:
  url: ws://ENGINE_PRIVATE_IP:9000   # templated in by cloud-init
  reconnect_backoff_ms: 1000

request_timeout_ms: 30000

routes:
  - path: /v1/chat/completions
    method: POST
    capability: inference::run_inference

  - path: /healthz
    method: GET
    handler: builtin::healthz

metrics:
  enabled: true
  bind: 127.0.0.1:9100
