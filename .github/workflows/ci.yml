name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5
      - run: terraform fmt -check -recursive
      - run: terraform init -backend=false
      - run: terraform validate
      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --init && tflint

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/inference-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Only deps needed for lint + import-shape tests; skip llama-cpp-python
      # (native build, slow). Runtime venv on the VM installs the full requirements.
      - run: pip install "iii-sdk>=0.12,<0.13" pytest ruff
      - run: ruff check src
      - run: PYTHONPATH=src pytest -q

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/caller-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run build
