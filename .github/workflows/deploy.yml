name: deploy

# App-only deployment: build worker bundles, upload to S3,
# pin /iii/active_release, trigger SSM redeploy on instances.
#
# Infra changes are NOT applied here — run `terraform apply` from a workstation
# (or a separate, more-privileged workflow) after reviewing the plan. The deploy
# role intentionally lacks broad ec2/iam permissions; see docs/HARDENING.md.

on:
  # main -> prod. Add 'dev' here when enabling stage.
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: "Release SHA to pin (defaults to current SHA)"
        required: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  PROJECT_NAME: iii

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.rel.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: rel
        run: echo "sha=${{ inputs.release || github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build caller-worker
        run: |
          cd workers/caller-worker
          npm install --no-audit --no-fund
          npm run build
          tar -czf /tmp/caller-worker.tar.gz dist package.json package-lock.json node_modules

      - name: Package inference-worker
        run: |
          cd workers/inference-worker
          tar -czf /tmp/inference-worker.tar.gz \
            src requirements.txt pyproject.toml

      # Engine + gateway have no app code -- iii installed via curl in cloud-init,
      # nginx config baked into user-data. Only worker bundles ship.
      - uses: actions/upload-artifact@v4
        with:
          name: bundles
          path: |
            /tmp/inference-worker.tar.gz
            /tmp/caller-worker.tar.gz
          retention-days: 14

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # main -> prod, dev -> stage. Ternary already wired; just create the
    # 'stage' GitHub Environment and add 'dev' to triggers above to activate.
    environment: ${{ github.ref_name == 'main' && 'prod' || 'stage' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bundles
          path: bundles

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Upload bundles to S3
        run: |
          REL=${{ needs.build.outputs.release }}
          BUCKET=${{ vars.ARTIFACT_BUCKET }}
          for f in bundles/*.tar.gz; do
            aws s3 cp "$f" "s3://$BUCKET/$REL/$(basename "$f")"
          done

      - name: Pin release
        run: |
          aws ssm put-parameter \
            --name "/${PROJECT_NAME}/active_release" \
            --value "${{ needs.build.outputs.release }}" \
            --type String --overwrite

      - name: Trigger SSM deploy
        id: ssm
        run: |
          CMD_ID=$(aws ssm send-command \
            --document-name "${{ vars.SSM_DEPLOY_DOCUMENT }}" \
            --targets "Key=tag:app,Values=iii" \
            --parameters "release=${{ needs.build.outputs.release }}" \
            --comment "deploy ${{ needs.build.outputs.release }}" \
            --timeout-seconds 1800 \
            --query 'Command.CommandId' --output text)
          echo "command_id=$CMD_ID" >> "$GITHUB_OUTPUT"
          echo "Command ID: $CMD_ID"

      - name: Wait for SSM completion
        # Up to 15 min total (45 * 20s). Long enough for llama-cpp-python native
        # compile on inference-worker first deploys.
        run: |
          CMD=${{ steps.ssm.outputs.command_id }}
          for i in $(seq 1 45); do
            STATUSES=$(aws ssm list-command-invocations --command-id "$CMD" \
              --query 'CommandInvocations[].Status' --output text)
            echo "[$i/45] statuses: $STATUSES"
            case "$STATUSES" in
              *Failed*|*Cancelled*|*TimedOut*) echo "deploy failed"; break ;;
            esac
            if [ -z "$(echo "$STATUSES" | tr -d 'Success \t\n')" ] && [ -n "$STATUSES" ]; then
              echo "all instances succeeded"
              exit 0
            fi
            sleep 20
          done

          # Diagnostics: which instance + last 30 lines of its output
          echo "=== diagnostics ==="
          for IID in $(aws ssm list-command-invocations --command-id "$CMD" \
            --query 'CommandInvocations[].InstanceId' --output text); do
            S=$(aws ssm get-command-invocation --command-id "$CMD" --instance-id "$IID" --query Status --output text)
            R=$(aws ec2 describe-instances --instance-ids "$IID" \
              --query 'Reservations[].Instances[].Tags[?Key==`role`].Value' --output text)
            echo "--- $R ($IID): $S ---"
            aws ssm get-command-invocation --command-id "$CMD" --instance-id "$IID" \
              --query 'StandardOutputContent' --output text | tail -30
            aws ssm get-command-invocation --command-id "$CMD" --instance-id "$IID" \
              --query 'StandardErrorContent' --output text | tail -10
          done
          exit 1

      - name: Smoke test
        run: |
          IP=$(aws ec2 describe-instances \
            --filters "Name=tag:app,Values=iii" "Name=tag:role,Values=gateway" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].PublicIpAddress' --output text | head -n1)
          [ -n "$IP" ] || { echo "no gateway IP found"; exit 1; }
          API="http://$IP"
          echo "smoke: $API/healthz"
          for i in $(seq 1 30); do
            if curl -fsS "$API/healthz" >/dev/null 2>&1; then
              echo "API up"
              exit 0
            fi
            sleep 5
          done
          echo "API never came up" >&2
          exit 1
